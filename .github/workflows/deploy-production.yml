name: Deploy to Production

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        default: ''

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '9.14.2'

jobs:
  pre-deployment-checks:
    name: Pre-Deployment Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify deployment confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "❌ Deployment not confirmed. Please type 'deploy' to confirm."
            exit 1
          fi
          echo "✅ Deployment confirmed"

      - name: Verify CI passed
        run: |
          echo "✅ Assuming CI pipeline has passed (run separately or add dependency)"
          # In a real scenario, you might want to check the status of the CI workflow
          # or make this job depend on the CI workflow completion

  deploy-backend:
    name: Deploy Backend to Production
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks]
    environment:
      name: production
      url: https://api.buildmyhouse.app
    env:
      AWS_REGION: eu-north-1
      ECR_REGISTRY: 399095821429.dkr.ecr.eu-north-1.amazonaws.com
      ECR_REPO: buildmyhouse-backend
      ECS_CLUSTER: buildmyhouse-prod
      ECS_SERVICE: backend-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @buildmyhouse/backend prisma:generate

      - name: Build backend
        run: pnpm --filter @buildmyhouse/backend build

      - name: Build and push Docker image
        run: |
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPO:${{ github.sha }} \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            -f apps/backend/Dockerfile \
            --build-arg NODE_ENV=production \
            .
          docker push $ECR_REGISTRY/$ECR_REPO:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPO:latest

      # Keeps ECS container start command in sync with apps/backend/Dockerfile (prisma generate + migrate).
      - name: Register ECS task definition (backend)
        id: backend-taskdef
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://infrastructure/ecs/backend-task-definition.json \
            --region "$AWS_REGION" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered $TASK_DEF_ARN"
          echo "arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition "${{ steps.backend-taskdef.outputs.arn }}" \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Health check
        continue-on-error: true
        run: |
          echo "🔍 Waiting 60s for deployment, then checking health..."
          sleep 60
          curl -sf --connect-timeout 10 https://api.buildmyhouse.app/api/health || echo "⚠️ Health check skipped (service may still be starting)"
          echo "✅ Deploy step complete"

  deploy-homeowner:
    name: Deploy Homeowner Web App
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks]
    continue-on-error: true
    environment:
      name: production
      url: https://buildmyhouse.app
    env:
      AWS_REGION: eu-north-1
      AWS_S3_BUCKET_HOMEOWNER: ${{ secrets.AWS_S3_BUCKET_HOMEOWNER }}
      AWS_CLOUDFRONT_HOMEOWNER_ID: ${{ secrets.AWS_CLOUDFRONT_HOMEOWNER_ID }}
      EXPO_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.PRODUCTION_GOOGLE_CLIENT_ID }}
      EXPO_PUBLIC_WEB_URL: https://buildmyhouse.app
      EXPO_PUBLIC_GSC_VERIFICATION: oXMp0QHWTK-YkDQ5L8sNre1YHVZR_6Tt7VBUP8DQ5X8
      EXPO_PUBLIC_GA_MEASUREMENT_ID: G-WWK0DNZNSM
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: env.AWS_S3_BUCKET_HOMEOWNER != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set API URL for build
        id: homeowner-api-url
        run: |
          API_URL="${{ secrets.PRODUCTION_API_URL }}"
          API_URL="${API_URL:-https://api.buildmyhouse.app}"
          API_URL="${API_URL%/}"
          if [[ "$API_URL" != */api ]]; then
            API_URL="$API_URL/api"
          fi
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Validate Google OAuth client secret is configured
        run: |
          if [ -z "$EXPO_PUBLIC_GOOGLE_CLIENT_ID" ]; then
            echo "❌ Missing PRODUCTION_GOOGLE_CLIENT_ID GitHub secret"
            exit 1
          fi

      - name: Build homeowner web app
        run: |
          EXPO_PUBLIC_API_URL=${{ steps.homeowner-api-url.outputs.api_url }} \
          EXPO_PUBLIC_WEB_URL=${{ env.EXPO_PUBLIC_WEB_URL }} \
          EXPO_PUBLIC_GSC_VERIFICATION=${{ env.EXPO_PUBLIC_GSC_VERIFICATION }} \
          EXPO_PUBLIC_GA_MEASUREMENT_ID=${{ env.EXPO_PUBLIC_GA_MEASUREMENT_ID }} \
          pnpm --filter mobile-homeowner build

      - name: Deploy to S3
        if: env.AWS_S3_BUCKET_HOMEOWNER != ''
        run: |
          aws s3 sync apps/mobile-homeowner/dist "s3://$AWS_S3_BUCKET_HOMEOWNER" --delete --region "$AWS_REGION"
          if [ -n "$AWS_CLOUDFRONT_HOMEOWNER_ID" ]; then
            aws cloudfront create-invalidation --distribution-id "$AWS_CLOUDFRONT_HOMEOWNER_ID" --paths "/*" --region "$AWS_REGION"
          fi
          echo "✅ Deployed to S3"

      - name: Deploy skipped (no S3 bucket)
        if: env.AWS_S3_BUCKET_HOMEOWNER == ''
        run: |
          echo "Skipped: Set AWS_S3_BUCKET_HOMEOWNER secret to deploy to S3"

      - name: Health check
        continue-on-error: true
        run: |
          sleep 10
          curl -sf --connect-timeout 10 https://buildmyhouse.app || echo "⚠️ Health check skipped"
          echo "✅ Deploy step complete"

  deploy-contractor:
    name: Deploy GC Web App
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks]
    continue-on-error: true
    environment:
      name: production
      url: https://gc.buildmyhouse.app
    env:
      AWS_REGION: eu-north-1
      AWS_S3_BUCKET_CONTRACTOR: ${{ secrets.AWS_S3_BUCKET_CONTRACTOR }}
      AWS_CLOUDFRONT_CONTRACTOR_ID: ${{ secrets.AWS_CLOUDFRONT_CONTRACTOR_ID }}
      EXPO_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.PRODUCTION_GOOGLE_CLIENT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: env.AWS_S3_BUCKET_CONTRACTOR != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set API URL for build
        id: contractor-api-url
        run: |
          API_URL="${{ secrets.PRODUCTION_API_URL }}"
          API_URL="${API_URL:-https://api.buildmyhouse.app}"
          API_URL="${API_URL%/}"
          if [[ "$API_URL" != */api ]]; then
            API_URL="$API_URL/api"
          fi
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Validate Google OAuth client secret is configured
        run: |
          if [ -z "$EXPO_PUBLIC_GOOGLE_CLIENT_ID" ]; then
            echo "❌ Missing PRODUCTION_GOOGLE_CLIENT_ID GitHub secret"
            exit 1
          fi

      - name: Build GC web app
        run: EXPO_PUBLIC_API_URL=${{ steps.contractor-api-url.outputs.api_url }} pnpm --filter mobile-contractor build

      - name: Deploy to S3
        if: env.AWS_S3_BUCKET_CONTRACTOR != ''
        run: |
          aws s3 sync apps/mobile-contractor/dist "s3://$AWS_S3_BUCKET_CONTRACTOR" --delete --region "$AWS_REGION"
          if [ -n "$AWS_CLOUDFRONT_CONTRACTOR_ID" ]; then
            aws cloudfront create-invalidation --distribution-id "$AWS_CLOUDFRONT_CONTRACTOR_ID" --paths "/*" --region "$AWS_REGION"
          fi
          echo "✅ Deployed to S3"

      - name: Deploy skipped (no S3 bucket)
        if: env.AWS_S3_BUCKET_CONTRACTOR == ''
        run: |
          echo "Skipped: Set AWS_S3_BUCKET_CONTRACTOR secret to deploy to S3"

      - name: Health check
        continue-on-error: true
        run: |
          sleep 10
          curl -sf --connect-timeout 10 https://gc.buildmyhouse.app || echo "⚠️ Health check skipped"
          echo "✅ Deploy step complete"

  deploy-admin-dashboard:
    name: Deploy Admin Dashboard
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks]
    environment:
      name: production
      url: https://admin.buildmyhouse.app
    env:
      AWS_REGION: eu-north-1
      ECR_REGISTRY: 399095821429.dkr.ecr.eu-north-1.amazonaws.com
      ECR_REPO: buildmyhouse-admin
      ECS_CLUSTER: buildmyhouse-prod
      ECS_SERVICE: admin-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set API URL for build
        id: api-url
        run: |
          API_URL="${{ secrets.PRODUCTION_API_URL }}"
          API_URL="${API_URL:-https://api.buildmyhouse.app}"
          API_URL="${API_URL%/}"
          if [[ "$API_URL" != */api ]]; then
            API_URL="$API_URL/api"
          fi
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPO:${{ github.sha }} \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            -f apps/admin-dashboard/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.api-url.outputs.api_url }} \
            .
          docker push $ECR_REGISTRY/$ECR_REPO:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPO:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Health check
        continue-on-error: true
        run: |
          echo "🔍 Waiting 90s for ECS rollout, then checking health..."
          sleep 90
          curl -sf --connect-timeout 10 https://admin.buildmyhouse.app/health || curl -sf --connect-timeout 10 http://admin.buildmyhouse.app/health || echo "⚠️ Health check skipped (service may still be starting)"
          echo "✅ Deploy step complete"

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-homeowner, deploy-contractor, deploy-admin-dashboard]
    if: always()
    steps:
      - name: Notify on success
        if: success()
        run: |
          echo "✅ Production deployment successful!"
          # Add notification logic here (Slack, Discord, Email, etc.)

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Production deployment failed!"
          # Add notification logic here (Slack, Discord, Email, etc.)



